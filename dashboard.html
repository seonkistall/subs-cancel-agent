<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>끊어줌 — 내 구독 대시보드 (샘플)</title>
<!--
  ============================================================
  목업 대시보드 (샘플 데이터)  ·  데모 녹화 + 선예약 전환용
  ※ 실제 데이터 연동 없음. 영웅은 '끊기' 버튼(=실행). 대시보드는 무대.
  데모 녹화: 이 페이지를 열고 '끊기' 버튼을 눌러 취소 애니메이션을 찍으세요.
  ============================================================
-->
<style>
  :root{
    --ink:#0f1115;--muted:#6b7280;--line:#e7e8ea;--bg:#f6f7f9;--card:#fff;
    --accent:#1b5bff;--ok:#0a9d6e;--warn:#b4530a;--danger:#d33;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:920px;margin:0 auto;padding:0 18px}
  a{color:inherit;text-decoration:none}

  .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
  .logo{font-weight:800;font-size:19px}.logo b{color:var(--accent)}
  .demo-tag{font-size:12px;font-weight:600;color:var(--warn);background:#fff4e6;border:1px solid #ffd9a8;padding:5px 11px;border-radius:999px}

  .head{padding:26px 0 6px}
  .head h1{font-size:22px;letter-spacing:-.5px}
  .head p{color:var(--muted);font-size:14px;margin-top:4px}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .stat .k{font-size:13px;color:var(--muted)}
  .stat .v{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-top:6px}
  .stat .v small{font-size:14px;font-weight:600;color:var(--muted)}
  .stat.save .v{color:var(--ok)}

  .banner{background:#eef3ff;border:1px solid #d7e3ff;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .banner p{font-size:14px}
  .banner b{color:var(--accent)}
  .banner a.cta{background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:9px 16px;border-radius:10px}

  .listhead{display:flex;justify-content:space-between;align-items:baseline;margin:6px 2px 10px}
  .listhead h2{font-size:16px}.listhead span{font-size:13px;color:var(--muted)}

  .sub{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:opacity .3s,filter .3s}
  .ico{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px;flex:none}
  .meta{flex:1;min-width:0}
  .meta .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .meta .sub2{font-size:13px;color:var(--muted);margin-top:2px}
  .tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px}
  .tag.idle{color:var(--warn);background:#fff4e6;border:1px solid #ffd9a8}
  .amt{text-align:right;flex:none;min-width:96px}
  .amt .a{font-weight:800;font-size:15px}
  .amt .d{font-size:12px;color:var(--muted);margin-top:2px}
  .killbtn{flex:none;border:1.5px solid var(--accent);color:var(--accent);background:#fff;font-weight:700;font-size:14px;padding:9px 15px;border-radius:10px;cursor:pointer;transition:.15s;min-width:78px}
  .killbtn:hover{background:var(--accent);color:#fff}
  .killbtn:disabled{cursor:default}

  .sub.canceling{filter:grayscale(.3)}
  .sub.canceled{opacity:.55}
  .sub.canceled .nm{text-decoration:line-through}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes s{to{transform:rotate(360deg)}}
  .done{color:var(--ok);font-weight:700}

  .foot{padding:26px 0 50px;text-align:center;color:var(--muted);font-size:13px}
  @media(max-width:680px){
    .stats{grid-template-columns:1fr}
    .amt{min-width:78px}
    .sub2{display:none}
  }
</style>
</head>
<body>

<div class="topbar"><div class="wrap">
  <div class="logo">끊어<b>줌</b></div>
  <span class="demo-tag">샘플 데이터 · 데모 화면</span>
</div></div>

<div class="wrap">
  <div class="head">
    <h1>내 구독 한눈에</h1>
    <p>흩어진 결제일·원화/달러를 한 곳에. 끊고 싶은 건 버튼 하나로.</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="k">이번 달 총 구독료</div><div class="v" id="total">₩49,690 <small>+ $65</small></div></div>
    <div class="stat"><div class="k">활성 구독</div><div class="v"><span id="count">8</span><small>개</small></div></div>
    <div class="stat save"><div class="k">이번 달 아낀 금액</div><div class="v" id="saved">₩0</div></div>
  </div>

  <div class="banner">
    <p>💤 <b>2건</b>이 최근 30일간 미사용입니다. 새고 있을 가능성이 높아요.</p>
    <a class="cta" href="index.html#order">실제로 끊어주는 거 선예약 →</a>
  </div>

  <div class="listhead"><h2>구독 목록</h2><span>결제일 순</span></div>
  <div id="list">
    <!-- rows injected by JS -->
  </div>

  <div class="foot">
    이건 샘플 화면입니다. 정식 출시 시 당신의 실제 구독이 자동으로 모입니다.<br>
    <a href="index.html" style="color:var(--accent);font-weight:700">← 끊어줌 소개로 돌아가기</a>
  </div>
</div>

<script>
  var USD = 1370; // 데모용 환율
  var subs = [
    {n:"Supabase Pro", cat:"개발", plan:"Pro", krw:0, usd:25, day:1, color:"#3ecf8e", idle:true},
    {n:"왓챠", cat:"OTT", plan:"베이직", krw:7900, usd:0, day:3, color:"#ff0558", idle:true},
    {n:"Claude Pro", cat:"AI", plan:"Pro", krw:0, usd:20, day:5, color:"#d97757"},
    {n:"쿠팡 와우", cat:"멤버십", plan:"Wow", krw:7890, usd:0, day:9, color:"#b0d6ff", tc:"#1b5bff"},
    {n:"넷플릭스", cat:"OTT", plan:"프리미엄", krw:17000, usd:0, day:14, color:"#e50914"},
    {n:"텔레그램 프리미엄", cat:"메신저", plan:"Premium", krw:6000, usd:0, day:18, color:"#2aabee"},
    {n:"티빙", cat:"OTT", plan:"스탠다드", krw:10900, usd:0, day:22, color:"#ff153c"},
    {n:"ChatGPT Plus", cat:"AI", plan:"Plus", krw:0, usd:20, day:27, color:"#10a37f"}
  ];

  function won(n){ return "₩" + n.toLocaleString("ko-KR"); }
  function amtLabel(s){ return s.usd ? ("$" + s.usd) : won(s.krw); }
  function krwOf(s){ return s.usd ? Math.round(s.usd*USD) : s.krw; }

  var saved = 0, activeCount = subs.length;
  var listEl = document.getElementById("list");

  subs.forEach(function(s, i){
    var row = document.createElement("div");
    row.className = "sub"; row.dataset.i = i;
    row.innerHTML =
      '<div class="ico" style="background:'+s.color+';color:'+(s.tc||"#fff")+'">'+s.n.charAt(0)+'</div>'+
      '<div class="meta"><div class="nm">'+s.n+ (s.idle?' <span class="tag idle">💤 미사용 30일</span>':'') +'</div>'+
      '<div class="sub2">'+s.cat+' · '+s.plan+' · 매월 '+s.day+'일 결제</div></div>'+
      '<div class="amt"><div class="a">'+amtLabel(s)+'</div><div class="d">'+s.day+'일</div></div>'+
      '<button class="killbtn" onclick="kill(this,'+i+')">끊기</button>';
    listEl.appendChild(row);
  });

  function kill(btn, i){
    var s = subs[i];
    var row = btn.closest(".sub");
    if(row.classList.contains("canceled")) return;
    row.classList.add("canceling");
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>취소 중';
    setTimeout(function(){
      row.classList.remove("canceling");
      row.classList.add("canceled");
      btn.outerHTML = '<span class="done">✅ 해지됨</span>';
      saved += krwOf(s);
      activeCount -= 1;
      document.getElementById("saved").textContent = won(saved);
      document.getElementById("count").textContent = activeCount;
    }, 1200);
  }
</script>
</body>
</html>
