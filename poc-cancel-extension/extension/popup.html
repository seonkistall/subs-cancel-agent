<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<style>
  body { width: 320px; margin: 0; font: 13px/1.5 -apple-system, "Malgun Gothic", sans-serif; color: #19191c; background: #fff; }
  header { padding: 14px 16px 10px; border-bottom: 1px solid #eee; }
  header b { font-size: 15px; }
  header p { margin: 4px 0 0; color: #6a6e76; font-size: 12px; }
  .body { padding: 14px 16px; }
  button { font: inherit; font-weight: 600; border-radius: 9px; cursor: pointer; padding: 11px 14px; width: 100%; }
  #go { background: #19191c; color: #fff; border: 0; }
  #reset { background: #fff; color: #19191c; border: 1px solid #e3e3e0; margin-top: 8px; }
  pre { background: #f7f7f5; border: 1px solid #ececea; border-radius: 8px; padding: 10px; margin: 12px 0 0; white-space: pre-wrap; word-break: break-word; font: 11px/1.45 ui-monospace, monospace; color: #333; max-height: 260px; overflow: auto; }
</style>
</head>
<body>
  <header>
    <b>끊어줌 — 취소 엔진 PoC</b>
    <p>현재 탭에서 구독 취소 플로우를 구동합니다.<br>샌드박스 <code>subscriptions.html</code>에서 시작하세요.</p>
  </header>
  <div class="body">
    <button id="go">이 탭의 구독 취소 실행</button>
    <button id="reset">초기화</button>
    <pre id="status">대기 중.</pre>
  </div>
  <script src="popup.js"></script>
</body>
</html>
