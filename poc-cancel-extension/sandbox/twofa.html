<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>샌드박스 — 보안 확인 (2FA)</title>
<link rel="stylesheet" href="sandbox.css" />
</head>
<body>
  <div class="card">
    <h1>보안 확인</h1>
    <p class="sub">신뢰하는 기기로 전송된 6자리 코드를 입력하세요. (Apple 웹 흐름 모사 — 자동화 불가, 사람 필요)</p>

    <!-- pauseForHuman detects #twofa-wall and stops; the user completes this. -->
    <div class="modal" id="twofa-wall">
      <b>🔒 2단계 인증</b>
      <input type="text" id="twofa-input" placeholder="6자리 코드" />
      <div class="row">
        <button id="twofa-continue" class="primary" data-next="retention.html">코드 확인하고 계속</button>
      </div>
      <p class="sub" style="margin-top:10px">※ PoC 테스트에서는 “사람”이 이 버튼을 직접 누릅니다. 엔진은 여기서 멈추고 기다립니다.</p>
    </div>
  </div>
  <script src="sandbox.js"></script>
</body>
</html>
