<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>샌드박스 — 취소 결과 (POST)</title>
<link rel="stylesheet" href="sandbox.css" />
</head>
<body>
  <div class="card">
    <h1>구독 상태 (POST-STATE)</h1>
    <p class="sub">엔진은 이 페이지의 #status를 다시 읽어 PRE와 비교하고 SUCCESS / FAILED / INDETERMINATE를 판정합니다.</p>
    <div class="status" id="poststate"></div>
    <div class="row">
      <a class="link" href="subscriptions.html">↻ 처음으로 (다른 mode 테스트)</a>
    </div>
  </div>

  <script src="sandbox.js"></script>
  <script>
    (function () {
      var mode = window.__MODE || 'success';
      var host = document.getElementById('poststate');

      if (mode === 'indeterminate') {
        // No #status element at all -> engine verify times out -> INDETERMINATE (needs human review)
        host.innerHTML = '<div class="plan">⚠️ 상태를 불러오지 못했습니다</div>'
          + '<div class="renew">포털 응답 없음 / 페이지 손상. 엔진은 이 경우 자동성공으로 처리하지 않고 INDETERMINATE → 사람 검토로 보냅니다.</div>';
        return;
      }
      if (mode === 'fail') {
        host.innerHTML = '<div class="plan">Pro 플랜</div>'
          + '<div class="renew" id="status">자동 갱신: 2026-07-28 (Renews monthly · 취소 반영 안 됨)</div>'
          + '<div class="row"><button id="cancel-btn" class="danger">구독 취소</button></div>';
        return;
      }
      // success / 2fa  ->  auto-renew OFF, cancel control removed
      host.innerHTML = '<div class="plan">Pro 플랜</div>'
        + '<div class="renew ok" id="status">만료: 2026-07-28 (Expires · 갱신 해제됨)</div>';
    })();
  </script>
</body>
</html>
