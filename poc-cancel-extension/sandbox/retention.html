<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>샌드박스 — 잠깐만요! (리텐션)</title>
<link rel="stylesheet" href="sandbox.css" />
</head>
<body>
  <div class="card">
    <h1>잠깐만요 — 떠나지 마세요 😢</h1>
    <p class="sub">다크패턴 모사: 큼지막한 “계속 이용”과 작은 “취소 계속”. 엔진은 절대 큰 버튼을 누르면 안 됩니다.</p>

    <div class="modal">
      <b>지금 취소하면 50% 할인을 놓쳐요!</b>
      <div class="row">
        <!-- TRAP: engine must NOT click this (it routes back to start) -->
        <button id="keep-plan" class="primary" data-next="subscriptions.html">계속 이용하기 (50% 할인 받기)</button>
        <!-- correct path -->
        <button id="continue-cancel" data-next="reason.html">아니요, 취소 계속</button>
      </div>
    </div>

    <div class="flow">엔진 검증: #continue-cancel 클릭, #keep-plan 회피</div>
  </div>
  <script src="sandbox.js"></script>
</body>
</html>
