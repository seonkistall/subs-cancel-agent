<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>샌드박스 — 구독 관리</title>
<link rel="stylesheet" href="sandbox.css" />
</head>
<body>
  <div class="card">
    <h1>Pro 플랜 관리</h1>
    <p class="sub">결제 수단 변경, 플랜 변경, 또는 구독 취소.</p>

    <div class="row">
      <!-- normal -> retention ; mode=2fa -> twofa first -->
      <button id="cancel-btn" class="danger" data-next="retention.html" data-next-2fa="twofa.html">구독 취소</button>
      <button class="btn">플랜 변경</button>
    </div>

    <div class="flow">step: 구독 취소 클릭 → (2fa 모드면 보안 단계) → 리텐션 팝업</div>
  </div>
  <script src="sandbox.js"></script>
</body>
</html>
